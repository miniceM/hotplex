# HotPlex Docker Compose Deployment
# Start with: docker compose up -d

services:
  # ---------------------------------------------------------
  # All-in-One Build: hotplexd + Claude Code
  # ---------------------------------------------------------
  hotplex:
    build:
      context: .
      args:
        - HOST_UID=${HOST_UID:-1000}
        - VERSION=${VERSION:-dev}
    image: ghcr.io/hrygo/hotplex:latest
    container_name: hotplex
    ports:
      - "18080:8080"
    volumes:
      # Map host configurations into the container for seamless transition
      # Note: Home in container is /home/hotplex
      - ${HOME}/.hotplex:/home/hotplex/.hotplex
      - ${HOME}/.claude:/home/hotplex/.claude:rw
      - ${HOME}/.claude.json:/home/hotplex/.claude.json:rw
      - ${HOME}/.slack/BOT_U0AHRCL1KCM:/home/hotplex/projects:rw
      # Bot 01 Git config (HotPlexBot01)
      - ${HOME}/.gitconfig-hotplex:/home/hotplex/.gitconfig:ro
      # Go development cache (persist dependencies and build cache)
      - hotplex-go-mod:/home/hotplex/go/pkg/mod
      - hotplex-go-build:/home/hotplex/.cache/go-build
    env_file:
      - .env
    environment:
      # Only override values that differ from .env
      - HOST_UID=${HOST_UID:-1000}
      - ANTHROPIC_BASE_URL=http://host.docker.internal:15721
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped

  # ---------------------------------------------------------
  # Secondary Bot Build: Research Assistant Robot
  # ---------------------------------------------------------
  hotplex-secondary:
    image: ghcr.io/hrygo/hotplex:latest
    container_name: hotplex-secondary
    ports:
      - "18081:8080"
    volumes:
      - ${HOME}/.hotplex:/home/hotplex/.hotplex
      - ${HOME}/.claude:/home/hotplex/.claude:rw
      - ${HOME}/.claude.json:/home/hotplex/.claude.json:rw
      - ${HOME}/.slack/BOT_U0AJVRH4YF6:/home/hotplex/projects:rw
      # Override the default slack config with secondary one
      - ./chatapps/configs/slack_secondary.yaml:/app/chatapps/configs/slack.yaml:ro
      # Bot 02 Git config (HotPlexBot02)
      - ${HOME}/.gitconfig-hotplex-secondary:/home/hotplex/.gitconfig:ro
      # Go development cache (shared with primary)
      - hotplex-go-mod:/home/hotplex/go/pkg/mod
      - hotplex-go-build:/home/hotplex/.cache/go-build
    env_file:
      - .env.secondary
    environment:
      # Only override values that differ from .env
      - HOST_UID=${HOST_UID:-1000}
      - ANTHROPIC_BASE_URL=http://host.docker.internal:15721
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# Named volumes for Go cache persistence
volumes:
  hotplex-go-mod:
    name: hotplex-go-mod
  hotplex-go-build:
    name: hotplex-go-build
