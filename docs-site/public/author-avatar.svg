    <path d="M 250 800 L 350 600" fill="none" stroke="#334155" stroke-width="8" />
    <path d="M 550 800 L 450 600" fill="none" stroke="#334155" stroke-width="8" />
  </g>

  <g id="parrot" transform="translate(220, 450)">
