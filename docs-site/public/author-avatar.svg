    <circle cx="200" cy="150" r="5" />
    <circle cx="300" cy="250" r="4" />
    <circle cx="250" cy="350" r="3" />
    <circle cx="700" cy="300" r="5" />
    <circle cx="600" cy="200" r="4" />
    <circle cx="550" cy="350" r="4" />
