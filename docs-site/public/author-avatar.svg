    <ellipse cx="40" cy="80" rx="35" ry="55" fill="#22C55E" />
    <path d="M 20 60 C 5 90, 5 120, 20 140 C 40 120, 40 80, 20 60 Z" fill="#16A34A" />
    <path d="M 20 60 C 25 70, 35 70, 40 60 Z" fill="#EF4444" /> <circle cx="50" cy="35" r="28" fill="#22C55E" />
    <path d="M 40 15 Q 50 5 60 15 Q 60 25 40 25 Z" fill="#FDE047" /> <path d="M 75 30 Q 90 35 75 50 Q 80 40 65 40 Z" fill="#94A3B8" />
    <circle cx="60" cy="30" r="4" fill="#0F172A" />
    <circle cx="61" cy="29" r="1.5" fill="#FFFFFF" />
