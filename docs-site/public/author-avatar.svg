    <path d="M 300 250 C 300 150, 500 150, 500 250 L 485 380 C 475 450, 325 450, 315 380 Z" fill="#E0A985" />
    
    <path d="M 300 250 C 300 160, 500 160, 500 250 C 500 210, 300 210, 300 250 Z" fill="#292524" />
    <path d="M 295 250 Q 300 200 400 180 Q 500 200 505 250 L 500 270 Q 400 230 300 270 Z" fill="#1C1917" />
    
    <path d="M 300 300 C 280 300, 280 350, 310 360 Z" fill="#C28A65" />
    <path d="M 500 300 C 520 300, 520 350, 490 360 Z" fill="#C28A65" />

    <path d="M 320 300 L 380 310 L 375 315 L 320 305 Z" fill="#292524" />
