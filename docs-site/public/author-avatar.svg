    <circle cx="355" cy="328" r="5" fill="#0F172A" />
    <path d="M 475 330 Q 445 320, 415 330 Q 445 335, 475 330 Z" fill="#FFFFFF" />
    <circle cx="445" cy="328" r="5" fill="#0F172A" />

    <path d="M 400 330 L 390 375 L 405 380 Z" fill="#C28A65" opacity="0.5" />

    <path d="M 370 410 Q 400 415 430 410" fill="none" stroke="#8C5C40" stroke-width="3" stroke-linecap="round" />

    <rect x="315" y="310" width="75" height="40" rx="8" fill="none" stroke="#38BDF8" stroke-width="3" filter="url(#neonGlow)" />
    <rect x="410" y="310" width="75" height="40" rx="8" fill="none" stroke="#38BDF8" stroke-width="3" filter="url(#neonGlow)" />
    <line x1="390" y1="325" x2="410" y2="325" stroke="#38BDF8" stroke-width="3" />
    <line x1="295" y1="325" x2="315" y2="325" stroke="#38BDF8" stroke-width="4" />
    <line x1="485" y1="325" x2="505" y2="325" stroke="#38BDF8" stroke-width="4" />
