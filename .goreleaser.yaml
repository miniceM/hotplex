# .goreleaser.yaml
# Build and release configuration for HotPlex (v2 syntax)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hotplexd
    binary: hotplexd
    main: ./cmd/hotplexd/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "hotplex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [ zip ]
    files:
      - LICENSE
      - README.md
      - README_zh.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Tag }}-next"

dockers:
  - image_templates:
      - ghcr.io/hrygo/hotplex:{{ .Version }}
      - ghcr.io/hrygo/hotplex:latest
    dockerfile: Dockerfile
    build_flag_templates:
      - --build-arg=VERSION={{ .Version }}
      - --build-arg=HOST_UID=1000
