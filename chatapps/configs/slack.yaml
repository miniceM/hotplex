# =============================================================================
# HotPlex Slack Adapter Configuration
# =============================================================================
# Detailed Setup Guide: docs/chatapps/chatapps-slack.md

# [Required] Platform identifier
platform: slack

# -----------------------------------------------------------------------------
# AI Provider Settings
# -----------------------------------------------------------------------------
provider:
  # AI backend type:
  # - claude-code: Anthropic's Claude Code CLI (Default)
  # - opencode: OpenCode (supports multiple LLM backends via its own config)
  type: claude-code

  # Global settings (applied to all providers)
  enabled: true
  default_model: sonnet            # Model: sonnet, haiku, opus (Claude); or any model ID (OpenCode)
  default_permission_mode: bypass-permissions # bypassPermissions, acceptEdits, default, dontAsk, plan
  dangerously_skip_permissions: true
  # [Docker/Container Environment - Recommended]
  # In containerized environments (Docker, Kubernetes), it is recommended to enable:
  # dangerously_skip_permissions: true
  # This bypasses all permission checks, enabling fully autonomous mode.
  # Use only in sandboxed environments with no internet access or read-only filesystem.
  # docker run -e HOTPLEX_PROVIDER_DANGEROUSLY_SKIP_PERMISSIONS=true ...

  # binary_path: /usr/local/bin/claude        # Optional: override binary lookup path
  # Tool filtering (Provider-level override)
  # allowed_tools: ["Bash", "Edit"]
  # disallowed_tools: ["Bash"]

  # ---------------------------------------------------------------------------
  # OpenCode Specific Settings (Only active if type is 'opencode')
  # ---------------------------------------------------------------------------
  # opencode:
  #   use_http_api: false          # Set true to use OpenCode's SSE HTTP API
  #   port: 4096                   # HTTP API port (default: 4096)
  #   plan_mode: false             # Enable planning mode (Architect role)
  #   provider: openai             # OpenCode LLM provider (openai, anthropic, deepseek, etc.)
  #   model: gpt-4o                # Specific model ID for the selected provider

# -----------------------------------------------------------------------------
# Workspace & Engine Settings
# -----------------------------------------------------------------------------
engine:
  work_dir: ~/projects/hotplex                # Agent's working directory
  timeout: 30m                                # Max wait for AI response
  idle_timeout: 1h                           # Session persistence time

  # Tool filtering (Optional: Whitelist or Blacklist)
  # allowed_tools: ["Bash", "Edit"]    # If set, ONLY these tools can be used
  # disallowed_tools: ["Bash"]         # If set, these tools are forbidden

# -----------------------------------------------------------------------------
# Session Lifecycle
# -----------------------------------------------------------------------------
session:
  timeout: 1h                   # Inactivity before cleanup
  cleanup_interval: 5m          # Frequency of scanning for expired sessions

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------
# Mode: "socket" (local/dev - no public IP) or "http" (production - webhook)
# Socket mode is recommended for development and local use.
mode: socket

# HTTP server address (for webhook mode or health check)
# Only used when mode is "http"
server_addr: :8080

# -----------------------------------------------------------------------------
# AI Identity & Behavior
# -----------------------------------------------------------------------------
# ⚠️  CUSTOMIZE THIS PROMPT for your project! ⚠️
# The system_prompt below is an EXAMPLE for the HotPlex project.
# Define your own AI identity, workflow, and conventions.
# -----------------------------------------------------------------------------
system_prompt: |
  You are HotPlex, an expert software engineer in a Slack conversation.

  ## Environment
  - Running under HotPlex engine (stdin/stdout)
  - Headless mode - cannot prompt for user input

  ## Slack Context
  - Replies go to thread automatically
  - Keep answers concise - user expects quick responses

  ## Git Workflow (Fork + Feature Branch)

  ### Repository Structure
  ```
  upstream (hrygo/hotplex)     ← Source of truth
      │
      └── origin (your fork)   ← Your remote
              │
              └── local        ← Your machine
  ```

  ### Before Starting New Work
  1. **Save current work**:
     - Commit and push current branch to origin
     - If PR exists, verify all CI checks pass
  2. **Sync main branches** (main is SYNC-ONLY, no development):
     ```bash
     git checkout main
     git fetch upstream
     git reset --hard upstream/main    # Force sync with upstream
     git push origin main --force      # Update fork's main
     ```

  ### Feature Development Flow
  1. **Create Issue** (if not exists):
     ```bash
     gh issue create -t "[type] description" -b "body"
     ```
     Types: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`

  2. **Create Feature Branch**:
     ```bash
     git checkout -b <type>/<issue-id>-short-desc
     # Example: feat/123-add-user-auth
     ```

  3. **Commit (Atomic & Frequent)**:
     ```bash
     git commit -m "<type>(scope): description (Refs #ID)"
     # Example: feat(auth): add OAuth login (Refs #123)
     ```
     - One commit per independent logic unit
     - Use `wip:` prefix for checkpoints

  4. **Create Pull Request**:
     ```bash
     git push origin <branch>
     gh pr create --fill
     ```
     - Body must include: `Resolves #ID` or `Refs #ID`
     - PR targets `upstream/main`, NOT your origin/main

  ### Safety Rules
  - **FORBIDDEN**: `checkout .`, `reset --hard`, `clean -fd` (lose uncommitted work)
  - **REQUIRED**: `git status` before branch switching
  - **SYNC-ONLY**: main branch - no commits, no development
  - **PROTECTED**: upstream/main is the target - PR only

  ## Output
  - Be concise - short messages preferred
  - Use bullet lists over paragraphs
  - Use code blocks for code snippets
  - Avoid tables - use lists instead

task_instructions: |
  1. Understand before acting
  2. Avoid operations requiring user input
  3. Summarize tool output - don't dump raw data
  4. Write detailed content to docs/ directory

# -----------------------------------------------------------------------------
# Feature Toggles
# -----------------------------------------------------------------------------
features:
  # Split messages > 4000 chars (Slack limit)
  chunking:
    enabled: true
    max_chars: 4000

  # Reply in threads to keep channels clean
  threading:
    enabled: true

  # Auto-retry on Slack API rate limits (HTTP 429)
  rate_limit:
    enabled: true
    max_attempts: 3
    base_delay_ms: 500
    max_delay_ms: 5000

  # Convert standard Markdown to Slack mrkdwn
  markdown:
    enabled: true

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  # Verify Slack request signatures (mandatory for HTTP mode)
  verify_signature: true

  # User & Channel Permissions
  permission:
    # DM Policy: "allow" (all), "pairing" (active users only), "block"
    dm_policy: allow

    # Group Policy options:
    # - "allow": Respond to all group messages (default)
    # - "mention": Only respond when bot is @mentioned
    # - "multibot": Multi-bot mode - @mentioned bot responds, no @ = all bots send polite response
    # - "block": Block all group messages
    group_policy: multibot  # Change from 'mention' to 'multibot' for multi-bot setups

    # [Required] Bot's own User ID (e.g., U12345678) for mention detection
    bot_user_id: ${HOTPLEX_SLACK_BOT_USER_ID}

    # [Optional] Broadcast response for multibot mode
    # When group_policy is "multibot" and message has no @ mentions,
    # this response is sent to politely inform users how to get help.
    # Leave empty to use default response.
    broadcast_response: |
      👋 Hello! I'm ready to help.
      Please @mention me if you'd like me to respond specifically to you.

    # Whitelist/Blacklist (Leave empty to skip)
    allowed_users: []      # Example: ["U12345", "U67890"]
    blocked_users: []

    # Slash Command rate limit (requests per second per user)
    # Default: 10.0
    slash_command_rate_limit: 10.0
