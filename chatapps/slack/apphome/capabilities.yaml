# HotPlex Capability Center - Predefined Capabilities
# Issue: #215

capabilities:
  # ========== Phase 1: MVP Capabilities ==========

  - id: code_review
    name: 代码审查
    icon: ":mag:"
    description: 对指定文件进行安全/性能/风格审查
    category: code
    enabled: true
    parameters:
      - id: target
        label: 审查目标
        type: text
        required: true
        placeholder: "例如: src/main.go 或具体代码片段"
      - id: focus
        label: 审查重点
        type: select
        required: false
        default: "all"
        options:
          - all
          - security
          - performance
          - style
          - maintainability
        placeholder: "选择审查重点"
      - id: context
        label: 额外说明
        type: multiline
        required: false
        placeholder: "可选：提供额外上下文或特定要求"
    prompt_template: |
      请对以下内容进行代码审查:
      目标: {{.target}}
      重点关注: {{.focus}}
      {{if .context}}额外说明: {{.context}}{{end}}

      请从以下角度进行分析:
      1. 安全性 - 是否存在安全漏洞
      2. 性能 - 是否有性能优化空间
      3. 代码风格 - 是否符合最佳实践
      4. 可维护性 - 代码是否易于理解和维护

      请提供具体的改进建议。
    brain_opts:
      intent_confirm: false
      compress_context: true
      preferred_model: claude-sonnet-4-6

  - id: explain_code
    name: 代码解释
    icon: ":book:"
    description: 解释代码片段的工作原理
    category: code
    enabled: true
    parameters:
      - id: code
        label: 代码片段
        type: multiline
        required: true
        placeholder: "粘贴需要解释的代码"
      - id: detail_level
        label: 详细程度
        type: select
        required: false
        default: "normal"
        options:
          - brief
          - normal
          - detailed
        placeholder: "选择解释详细程度"
    prompt_template: |
      请解释以下代码的工作原理:
      ```
      {{.code}}
      ```

      详细程度: {{.detail_level}}

      请包括:
      1. 代码的整体目的
      2. 关键逻辑和流程
      3. 使用的算法或数据结构
      4. 潜在的边界情况
    brain_opts:
      intent_confirm: false
      compress_context: false
      preferred_model: claude-sonnet-4-6

  - id: debug_error
    name: 错误诊断
    icon: ":bug:"
    description: 分析错误信息并给出修复方案
    category: debug
    enabled: true
    parameters:
      - id: error_message
        label: 错误信息
        type: multiline
        required: true
        placeholder: "粘贴完整的错误信息"
      - id: code_context
        label: 相关代码
        type: multiline
        required: false
        placeholder: "可选：提供相关代码上下文"
      - id: environment
        label: 运行环境
        type: text
        required: false
        placeholder: "例如: Go 1.22, Node.js 20, Python 3.12"
    prompt_template: |
      请分析以下错误并提供修复方案:

      错误信息:
      ```
      {{.error_message}}
      ```

      {{if .code_context}}相关代码:
      ```
      {{.code_context}}
      ```
      {{end}}
      {{if .environment}}运行环境: {{.environment}}{{end}}

      请提供:
      1. 错误根本原因分析
      2. 具体的修复步骤
      3. 预防类似错误的建议
    brain_opts:
      intent_confirm: false
      compress_context: true
      preferred_model: claude-sonnet-4-6

  # ========== Phase 2: Brain Integration Capabilities ==========

  - id: git_commit
    name: Commit 生成
    icon: ":package:"
    description: 生成 Conventional Commit 消息
    category: git
    enabled: true
    parameters:
      - id: changes
        label: 变更说明
        type: multiline
        required: true
        placeholder: "描述你的代码变更"
      - id: type
        label: 提交类型
        type: select
        required: false
        default: "feat"
        options:
          - feat
          - fix
          - refactor
          - docs
          - test
          - chore
          - style
          - perf
          - ci
        placeholder: "选择提交类型"
      - id: scope
        label: 作用域
        type: text
        required: false
        placeholder: "可选：模块或组件名称"
    prompt_template: |
      请根据以下变更生成 Conventional Commit 消息:

      变更说明:
      {{.changes}}

      类型: {{.type}}
      {{if .scope}}作用域: {{.scope}}{{end}}

      请生成:
      1. 符合 Conventional Commits 规范的标题行
      2. 详细的 body 说明（如果需要）
      3. 相关的 footer（如 Breaking Changes）

      格式要求:
      <type>(<scope>): <description>

      [optional body]

      [optional footer(s)]
    brain_opts:
      intent_confirm: true
      compress_context: false
      preferred_model: claude-sonnet-4-6

  - id: pr_review
    name: PR 审查
    icon: ":twisted_rightwards_arrows:"
    description: 审查 PR 变更并给出建议
    category: code
    enabled: true
    parameters:
      - id: pr_description
        label: PR 描述
        type: multiline
        required: true
        placeholder: "粘贴 PR 描述或变更摘要"
      - id: diff
        label: 代码变更
        type: multiline
        required: false
        placeholder: "可选：粘贴 git diff 输出"
      - id: focus
        label: 审查重点
        type: select
        required: false
        default: "all"
        options:
          - all
          - logic
          - security
          - performance
          - tests
    prompt_template: |
      请审查以下 Pull Request:

      PR 描述:
      {{.pr_description}}

      {{if .diff}}代码变更:
      ```diff
      {{.diff}}
      ```
      {{end}}

      审查重点: {{.focus}}

      请提供:
      1. 总体评价
      2. 发现的问题（按严重程度分类）
      3. 具体的改进建议
      4. 测试覆盖建议
    brain_opts:
      intent_confirm: false
      compress_context: true
      preferred_model: claude-sonnet-4-6

  - id: refactor
    name: 重构建议
    icon: ":recycle:"
    description: 分析代码并提供重构建议
    category: code
    enabled: true
    parameters:
      - id: code
        label: 代码片段
        type: multiline
        required: true
        placeholder: "粘贴需要重构的代码"
      - id: goals
        label: 重构目标
        type: select
        required: false
        default: "readability"
        options:
          - readability
          - performance
          - maintainability
          - testability
          - modularity
        placeholder: "选择重构目标"
      - id: constraints
        label: 约束条件
        type: multiline
        required: false
        placeholder: "可选：说明任何约束条件"
    prompt_template: |
      请分析以下代码并提供重构建议:

      ```go
      {{.code}}
      ```

      重构目标: {{.goals}}
      {{if .constraints}}约束条件: {{.constraints}}{{end}}

      请提供:
      1. 当前代码的问题分析
      2. 重构后的代码示例
      3. 重构带来的具体改进
      4. 重构步骤（如果复杂）
    brain_opts:
      intent_confirm: false
      compress_context: true
      preferred_model: claude-sonnet-4-6

  # ========== Phase 3: Extended Capabilities ==========

  - id: test_gen
    name: 测试生成
    icon: ":white_check_mark:"
    description: 为代码生成单元测试
    category: code
    enabled: true
    parameters:
      - id: code
        label: 代码片段
        type: multiline
        required: true
        placeholder: "粘贴需要测试的代码"
      - id: framework
        label: 测试框架
        type: select
        required: false
        default: "native"
        options:
          - native
          - testify
          - ginkgo
        placeholder: "选择测试框架"
    prompt_template: |
      请为以下代码生成单元测试:

      ```go
      {{.code}}
      ```

      测试框架: {{.framework}}

      请生成:
      1. 测试用例覆盖正常路径
      2. 测试用例覆盖边界情况
      3. 测试用例覆盖错误情况
      4. 必要的 mock 和 setup 代码
    brain_opts:
      intent_confirm: false
      compress_context: false
      preferred_model: claude-sonnet-4-6

  - id: doc_gen
    name: 文档生成
    icon: ":memo:"
    description: 生成代码文档
    category: docs
    enabled: true
    parameters:
      - id: code
        label: 代码片段
        type: multiline
        required: true
        placeholder: "粘贴需要文档化的代码"
      - id: format
        label: 文档格式
        type: select
        required: false
        default: "godoc"
        options:
          - godoc
          - markdown
          - openapi
        placeholder: "选择文档格式"
    prompt_template: |
      请为以下代码生成文档:

      ```go
      {{.code}}
      ```

      文档格式: {{.format}}

      请生成:
      1. 函数/方法说明
      2. 参数描述
      3. 返回值描述
      4. 使用示例
      5. 注意事项（如有）
    brain_opts:
      intent_confirm: false
      compress_context: false
      preferred_model: claude-sonnet-4-6
