name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HotPlex Version
      description: What version of HotPlex are you using? e.g. v0.3.0
    validations:
      required: true
  - type: input
    id: cc-version
    attributes:
      label: Claude Code Version
      description: What version of Claude Code CLI are you using? Run `claude --version`.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How did you get this error?
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
